services:
	- type: web
		name: jenanbiz-app
		runtime: node
		plan: starter
		rootDir: .
		buildCommand: cd frontend && npm ci --include=dev && npm run build && cd ../backend && npm ci --omit=dev
		startCommand: cd backend && npm start
		healthCheckPath: /api/health
		envVars:
			- key: NODE_VERSION
				value: 24
			- key: NODE_ENV
				value: production
			- key: PORT
				value: 10000
			- key: FRONTEND_URL
				value: https://jenanbiz.com
			- key: FRONTEND_URLS
				value: https://jenanbiz.com,https://www.jenanbiz.com
			- key: JWT_SECRET
				generateValue: true
